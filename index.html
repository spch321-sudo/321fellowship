<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12233F">
<title>321空中團契</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="321空中團契">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=3">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png?v=3">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png?v=3">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png?v=3">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png?v=3">
<link rel="apple-touch-icon-precomposed" href="apple-touch-icon-precomposed.png?v=3">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=3">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=3">
<link rel="icon" type="image/png" sizes="32x32" href="icon-76.png?v=3">
<style>
:root{
  --navy:#12233F; --blue:#2F5C93; --blue-2:#3E6FA8; --blue-light:#DCE6F2;
  --sky:#EAF1F9; --gold:#B8860B; --gold-bright:#C9A227; --paper:#FBFAF6;
  --ink:#1E2A38; --muted:#5C6B7A; --line:#E4E8EE; --white:#FFFFFF;
  --font-display:"Noto Serif TC","Songti TC","PMingLiU",serif;
  --font-body:"Noto Sans TC","PingFang TC","Microsoft JhengHei","Heiti TC",sans-serif;
  --fs:1;               /* 字級倍率，長輩友善可調 */
  --maxw:520px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body); color:var(--ink); background:var(--sky);
  font-size:calc(18px * var(--fs)); line-height:1.7;
  -webkit-font-smoothing:antialiased;
}
img{max-width:100%;display:block;}
button{font-family:inherit;cursor:pointer;}
a{color:var(--blue);text-decoration:none;}

/* 版心：手機直式，置中 */
#app{max-width:var(--maxw);margin:0 auto;min-height:100vh;background:var(--paper);
  position:relative;box-shadow:0 0 40px rgba(18,35,63,.06);overflow:hidden;}

/* 頂部列 */
.appbar{position:sticky;top:0;z-index:30;background:var(--navy);color:#fff;
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  padding-top:calc(14px + env(safe-area-inset-top));}
.appbar .brand{font-family:var(--font-display);font-weight:700;
  font-size:calc(19px * var(--fs));letter-spacing:.5px;flex:1;}
.appbar .brand small{display:block;font-family:var(--font-body);font-weight:400;
  font-size:calc(11px * var(--fs));color:var(--gold-bright);letter-spacing:2px;margin-top:1px;}
.iconbtn{background:transparent;border:0;color:#fff;padding:8px;border-radius:12px;
  min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center;transition:background .15s;}
.iconbtn:active{background:rgba(255,255,255,.12);}
.iconbtn svg{width:calc(24px * var(--fs));height:calc(24px * var(--fs));}

/* 內容視圖 */
#view{padding:18px 16px 110px;animation:fade .35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* 頁首（麵包屑式標題） */
.eyebrow{font-size:calc(12px * var(--fs));letter-spacing:3px;color:var(--gold);
  font-weight:700;text-transform:none;margin:2px 0 4px;}
.page-title{font-family:var(--font-display);font-weight:700;
  font-size:calc(27px * var(--fs));color:var(--navy);margin:0 0 6px;line-height:1.3;}
.page-sub{color:var(--muted);font-size:calc(15px * var(--fs));margin:0 0 18px;}

/* 卡片 */
.card{background:var(--white);border:1px solid var(--line);border-radius:16px;
  padding:16px 16px;margin:0 0 14px;box-shadow:0 1px 2px rgba(18,35,63,.03);}
.card h3{font-family:var(--font-display);margin:0 0 8px;color:var(--navy);
  font-size:calc(19px * var(--fs));}
.card p{margin:0 0 6px;color:var(--ink);}
.section-label{display:flex;align-items:center;gap:8px;margin:22px 2px 12px;}
.section-label .n{font-family:var(--font-display);color:var(--gold);font-weight:700;
  font-size:calc(15px * var(--fs));}
.section-label h2{font-family:var(--font-display);color:var(--navy);margin:0;
  font-size:calc(21px * var(--fs));}

/* 待填內容佔位 */
.slot{border:1px dashed #C9D3E0;border-radius:14px;background:#F6F9FD;
  padding:16px;color:var(--muted);font-size:calc(14px * var(--fs));text-align:center;}
.slot b{color:var(--blue);}

/* 今日一句 */
.verse{background:linear-gradient(160deg,#16294a,#28477a);color:#fff;border:0;
  border-radius:20px;padding:22px 20px;margin-bottom:18px;position:relative;overflow:hidden;}
.verse:before{content:"”";position:absolute;right:14px;top:-18px;font-family:var(--font-display);
  font-size:120px;color:rgba(201,162,39,.22);}
.verse .lbl{color:var(--gold-bright);font-size:calc(12px * var(--fs));letter-spacing:3px;font-weight:700;}
.verse .txt{font-family:var(--font-display);font-size:calc(21px * var(--fs));line-height:1.7;margin:8px 0 4px;}
.verse .ref{color:#cfe0f5;font-size:calc(13px * var(--fs));}
.verse .motto{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.15);
  color:#fff;font-size:calc(15px * var(--fs));}

/* 成長之路（標誌性元素） */
.path{position:relative;margin:8px 0 6px;padding-left:8px;}
.path .line{position:absolute;left:29px;top:14px;bottom:14px;width:3px;
  background:linear-gradient(#C9A227,#B8860B);border-radius:3px;opacity:.5;}
.station{display:flex;align-items:center;gap:14px;background:transparent;border:0;
  width:100%;text-align:left;padding:8px 6px;margin:0;position:relative;}
.station .dot{width:46px;height:46px;flex:0 0 46px;border-radius:50%;
  background:var(--white);border:3px solid var(--gold);color:var(--navy);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);
  font-weight:700;font-size:calc(18px * var(--fs));z-index:1;box-shadow:0 2px 8px rgba(184,134,11,.2);}
.station .meta{flex:1;}
.station .meta .k{font-family:var(--font-display);color:var(--navy);font-weight:700;
  font-size:calc(18px * var(--fs));}
.station .meta .d{color:var(--muted);font-size:calc(13px * var(--fs));}
.station .go{color:var(--blue);opacity:.5;}
.station:active{background:var(--sky);border-radius:14px;}

/* 快速鍵 */
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:6px 0 4px;}
.quick a{display:flex;flex-direction:column;align-items:center;gap:6px;
  background:var(--white);border:1px solid var(--line);border-radius:16px;padding:14px 6px;
  color:var(--navy);font-size:calc(13px * var(--fs));font-weight:600;text-align:center;}
.quick a:active{background:var(--sky);}
.quick .qi{width:40px;height:40px;border-radius:12px;background:var(--sky);
  display:flex;align-items:center;justify-content:center;}
.quick .qi svg{width:22px;height:22px;color:var(--blue);}

/* 清單列 */
.rowlink{display:flex;align-items:center;gap:12px;background:var(--white);
  border:1px solid var(--line);border-radius:14px;padding:14px 14px;margin-bottom:10px;
  width:100%;text-align:left;color:var(--ink);}
.rowlink:active{background:var(--sky);}
.rowlink .ri{width:40px;height:40px;flex:0 0 40px;border-radius:11px;background:var(--sky);
  display:flex;align-items:center;justify-content:center;color:var(--blue);}
.rowlink .rt{flex:1;}
.rowlink .rt b{display:block;font-size:calc(16px * var(--fs));color:var(--navy);}
.rowlink .rt span{color:var(--muted);font-size:calc(13px * var(--fs));}
.rowlink .chev{color:#B9C4D2;}

/* 321 理念圖卡 */
.creed .grp{margin-bottom:14px;}
.creed .grp .h{font-family:var(--font-display);color:var(--gold);font-weight:700;
  font-size:calc(15px * var(--fs));margin-bottom:8px;letter-spacing:1px;}
.creed .pill{background:var(--sky);border:1px solid var(--blue-light);border-radius:12px;
  padding:10px 14px;margin-bottom:8px;color:var(--navy);font-size:calc(16px * var(--fs));}

/* 標籤/晶片 */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch;}
.chip{flex:0 0 auto;background:var(--white);border:1px solid var(--line);border-radius:999px;
  padding:8px 16px;font-size:calc(14px * var(--fs));color:var(--navy);}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}

/* 搜尋 */
.search{display:flex;align-items:center;gap:10px;background:var(--white);
  border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:12px;}
.search svg{width:20px;height:20px;color:var(--muted);}
.search input{border:0;outline:0;flex:1;font-family:inherit;font-size:calc(16px * var(--fs));background:transparent;color:var(--ink);}

/* App 生態系啟動器 */
.apps{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.appcard{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:14px;
  display:block;color:var(--ink);}
.appcard .badge{width:44px;height:44px;border-radius:12px;background:linear-gradient(160deg,#2F5C93,#12233F);
  color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);
  font-weight:700;font-size:calc(16px * var(--fs));margin-bottom:10px;}
.appcard b{display:block;color:var(--navy);font-size:calc(16px * var(--fs));}
.appcard span{color:var(--muted);font-size:calc(12.5px * var(--fs));}

/* 主要按鈕 */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--navy);color:#fff;border:0;border-radius:14px;padding:15px 20px;
  font-size:calc(17px * var(--fs));font-weight:700;width:100%;}
.btn:active{opacity:.9;}
.btn.gold{background:var(--gold);}
.btn.ghost{background:transparent;border:2px solid var(--navy);color:var(--navy);}
.help-fab{position:fixed;right:calc((100vw - var(--maxw))/2 + 14px);bottom:96px;z-index:40;}
@media(max-width:520px){.help-fab{right:14px;}}
.help-fab button{background:var(--gold);color:#fff;border:0;border-radius:999px;
  padding:12px 18px;font-weight:700;font-size:calc(14px * var(--fs));
  box-shadow:0 6px 18px rgba(184,134,11,.4);display:flex;align-items:center;gap:8px;}

/* 底部導覽 */
.tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;z-index:35;
  width:100%;max-width:var(--maxw);background:var(--white);border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(5,1fr);
  padding-bottom:env(safe-area-inset-bottom);}
.tab{background:transparent;border:0;padding:9px 4px 8px;display:flex;flex-direction:column;
  align-items:center;gap:3px;color:var(--muted);font-size:calc(11px * var(--fs));}
.tab svg{width:24px;height:24px;}
.tab.on{color:var(--navy);}
.tab.on svg{color:var(--gold);}

/* 面板/浮層 */
.sheet{position:fixed;inset:0;z-index:60;display:none;}
.sheet.open{display:block;}
.sheet .mask{position:absolute;inset:0;background:rgba(18,35,63,.5);}
.sheet .panel{position:absolute;left:50%;transform:translateX(-50%);bottom:0;
  width:100%;max-width:var(--maxw);background:var(--paper);border-radius:22px 22px 0 0;
  padding:20px 18px calc(24px + env(safe-area-inset-bottom));}
.sheet .panel h3{font-family:var(--font-display);color:var(--navy);margin:0 0 14px;font-size:calc(20px * var(--fs));}
.fsrow{display:flex;align-items:center;gap:10px;justify-content:space-between;margin:10px 0 4px;}
.fsrow .opts{display:flex;gap:8px;}
.fsrow .opts button{border:1px solid var(--line);background:#fff;border-radius:12px;
  padding:8px 14px;font-weight:700;color:var(--navy);}
.fsrow .opts button.on{background:var(--navy);color:#fff;border-color:var(--navy);}

.offer{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;background:#fff;}
.offer .oc{display:inline-block;background:var(--navy);color:#fff;border-radius:8px;padding:3px 12px;font-size:calc(13px * var(--fs));font-weight:700;margin-bottom:8px;}
.offer .oh{font-weight:700;color:var(--navy);font-size:calc(16px * var(--fs));line-height:1.4;}
.offer .od{color:var(--muted);font-size:calc(14px * var(--fs));}
.offer .oa{font-family:"Menlo",monospace;color:var(--ink);font-size:calc(15px * var(--fs));letter-spacing:.5px;margin-top:3px;word-break:break-all;}
.mtg{display:flex;align-items:center;gap:12px;padding:12px 8px;border-bottom:1px solid var(--line);}
.mtg:last-child{border-bottom:0;}
.mt-time{flex:0 0 auto;text-align:center;min-width:96px;background:var(--sky);border-radius:10px;padding:6px 4px;}
.mt-time b{display:block;color:var(--navy);font-size:calc(15px * var(--fs));}
.mt-time span{color:var(--muted);font-size:calc(11px * var(--fs));}
.mt-body{flex:1;}
.mt-body b{display:block;color:var(--ink);font-size:calc(17px * var(--fs));font-family:var(--font-display);}
.mt-body span{color:var(--blue);font-size:calc(12px * var(--fs));}
.mt-go{background:var(--navy);color:#fff;border-radius:10px;padding:9px 15px;font-size:calc(14px * var(--fs));font-weight:700;flex:0 0 auto;}
.timeline .tl{display:flex;gap:12px;padding:8px 0;}
.tl-dot{width:14px;height:14px;border-radius:50%;background:var(--gold);border:3px solid #fff;box-shadow:0 0 0 1px var(--gold);flex:0 0 14px;margin-top:7px;}
.tl-body b{color:var(--navy);font-family:var(--font-display);font-size:calc(17px * var(--fs));}
.tl-body p{margin:3px 0 0;color:var(--ink);}
.cyc{display:flex;align-items:baseline;gap:10px;background:var(--sky);border-radius:12px;padding:11px 14px;}
.cyc-k{font-family:var(--font-display);font-weight:700;color:var(--navy);font-size:calc(16px * var(--fs));flex:0 0 auto;min-width:96px;}
.cyc-d{color:var(--muted);font-size:calc(14px * var(--fs));}
.cyc-arrow{text-align:center;color:var(--gold);font-size:calc(18px * var(--fs));margin:3px 0;}
.faq{border-bottom:1px solid var(--line);padding:12px 0;}
.faq:last-child{border-bottom:0;}
.faq b{display:block;color:var(--navy);font-size:calc(16px * var(--fs));margin-bottom:4px;}
.faq p{margin:0;color:var(--ink);}
.appicon{display:block;width:52px;height:52px;border-radius:13px;overflow:hidden;margin-bottom:10px;box-shadow:0 2px 6px rgba(18,35,63,.15);}
.appicon img{width:100%;height:100%;object-fit:cover;display:block;}
.qrbox{margin-top:12px;text-align:center;padding-top:12px;border-top:1px dashed var(--line);}
.qrimg{width:170px;height:170px;image-rendering:pixelated;border:1px solid var(--line);border-radius:10px;background:#fff;display:inline-block;}
.qrcap{margin-top:6px;color:var(--muted);font-size:calc(13px * var(--fs));}
.day{border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;background:#fff;}
.day summary{list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:center;gap:12px;font-family:var(--font-display);color:var(--navy);font-size:calc(17px * var(--fs));font-weight:700;}
.day summary::-webkit-details-marker{display:none;}
.day .dnum{width:34px;height:34px;flex:0 0 34px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:calc(15px * var(--fs));}
.day summary .darrow{margin-left:auto;color:#B9C4D2;}
.day[open] summary{border-bottom:1px solid var(--line);}
.day .dbody{padding:14px 16px;}
.day .dbody p{margin:0 0 10px;}
.dverse{background:var(--sky);border-left:4px solid var(--gold);border-radius:8px;padding:10px 12px;color:var(--navy);font-size:calc(15px * var(--fs));margin:10px 0;}
.dpray{color:var(--muted);font-size:calc(14px * var(--fs));font-style:italic;}
.decision{background:linear-gradient(160deg,#fbf3d9,#f6e8c0);border:1px solid #e8d38a;border-radius:18px;padding:18px;margin-bottom:14px;}
.decision h3{color:#8a6d00;margin:0 0 6px;font-size:calc(20px * var(--fs));}
.prayerbox{background:#fff;border-radius:14px;padding:16px;margin:12px 0;font-size:calc(17px * var(--fs));line-height:1.95;color:var(--ink);border:1px dashed var(--gold);}
.keypill{background:linear-gradient(135deg,#fbf3d9,#f3e4b6);border:1px solid #e8d38a;border-radius:10px;padding:8px 12px;color:#8a6d00;font-family:var(--font-display);font-weight:700;font-size:calc(15px * var(--fs));margin-top:6px;}
.switchtrack{background:transparent;border:1px solid var(--line);border-radius:999px;padding:8px 16px;color:var(--blue);font-size:calc(14px * var(--fs));font-weight:600;margin-bottom:16px;display:inline-flex;}
.switchtrack:active{background:var(--sky);}
.fld{display:block;margin-bottom:12px;}
.fld span{display:block;font-size:calc(14px * var(--fs));color:var(--navy);font-weight:600;margin-bottom:6px;}
.fld input,.fld textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-family:inherit;font-size:calc(16px * var(--fs));color:var(--ink);background:#fff;outline:none;box-sizing:border-box;}
.fld input:focus,.fld textarea:focus{border-color:var(--blue);}
.fld textarea{resize:vertical;}
.remindcard{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#eef5ff,#e2ecfb);border:1px solid var(--blue-light);border-radius:16px;padding:14px 14px;margin:0 0 16px;color:var(--ink);}
.remindcard:active{opacity:.9;}
.remindcard .ri{width:42px;height:42px;flex:0 0 42px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--blue);}
.remindcard .rt{flex:1;}
.remindcard .rt b{display:block;color:var(--navy);font-size:calc(16px * var(--fs));}
.remindcard .rt span{color:var(--muted);font-size:calc(13px * var(--fs));}
.rescard{position:relative;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 14px;margin-bottom:12px;}
.rescard b{display:block;color:var(--navy);font-size:calc(17px * var(--fs));font-family:var(--font-display);line-height:1.4;padding-right:70px;}
.rescard .resmeta{color:var(--muted);font-size:calc(13px * var(--fs));margin-top:3px;}
.rescard .restag{display:inline-block;background:var(--sky);color:var(--blue);border-radius:8px;padding:2px 10px;font-size:calc(12px * var(--fs));margin-top:8px;}
.rescard .pack{position:absolute;top:12px;right:12px;background:var(--gold);color:#fff;border-radius:8px;padding:3px 10px;font-size:calc(11px * var(--fs));font-weight:700;}
.fmts{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.fmt{display:inline-flex;align-items:center;gap:5px;background:var(--sky);border:1px solid var(--blue-light);border-radius:10px;padding:7px 12px;color:var(--blue);font-size:calc(13px * var(--fs));font-weight:600;}
.fmt:active{background:var(--blue-light);}
.search input:disabled{color:var(--muted);}
.course{border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;background:#fff;}
.course summary{list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:center;gap:10px;}
.course summary::-webkit-details-marker{display:none;}
.course .csum{flex:1;}
.course .csum b{display:block;font-family:var(--font-display);color:var(--navy);font-size:calc(17px * var(--fs));}
.course .csum span{color:var(--muted);font-size:calc(13px * var(--fs));}
.course[open] summary{border-bottom:1px solid var(--line);}
.course .cbody{padding:12px 16px;}
.lesson{display:flex;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line);}
.lesson:last-child{border-bottom:0;}
.lnum{width:28px;height:28px;flex:0 0 28px;border-radius:50%;background:var(--sky);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:calc(13px * var(--fs));font-weight:700;margin-top:2px;}
.lbody{flex:1;}
.lbody b{display:block;color:var(--ink);font-size:calc(16px * var(--fs));}
.note{color:var(--muted);font-size:calc(13px * var(--fs));margin:6px 2px 0;}
.hr{height:1px;background:var(--line);margin:18px 0;border:0;}
.center{text-align:center;}
</style>
</head>
<body>
<div id="app">
  <header class="appbar">
    <button class="iconbtn" id="backBtn" aria-label="返回" style="display:none">

  /* 新朋友專區內容（恩典先行） */
  newfriend: {
    welcome: "這裡有一個溫暖的家，正在等你。無論你是誰、從哪裡來、正經歷什麼，你都是被愛的、被等候的。歡迎你回家。",
    intro: "我們是一群來自世界各國、渴慕神的人，每天在線上一起認識耶穌、學習聖經。我們相信：耶穌是榜樣、聖經是準則、聖靈是引導。在這裡，你不需要先變好才被接納——正如你，就可以來。",
    path: [
      { d:1, t:"歡迎你回家",
        msg:"你今天會打開這個App，不是偶然。有一位神，在你還不認識祂的時候，就一直在等你。你是被愛的，不是因為你做了什麼，而是因為你本身就寶貴。",
        verse:"「你在我眼中看為寶貴，是尊榮的；我也愛你。」（賽四三4）",
        pray:"今天，只要輕輕地說：『神啊，如果你是真的，求你讓我認識你。』" },
      { d:2, t:"有一位這麼愛你的神",
        msg:"這位神不是遙遠、冷漠的。祂認識你的名字，數算你的頭髮，看見你每一滴眼淚。祂的愛不會因為你的軟弱而減少。",
        verse:"「神愛世人，甚至將他的獨生子賜給他們，叫一切信他的，不致滅亡，反得永生。」（約三16）",
        pray:"神啊，謝謝你這樣愛我，這份愛超過我所能明白的。" },
      { d:3, t:"祂為你做了一件事",
        msg:"耶穌來到世上，為你我的罪死在十字架上，第三天又復活了。這不只是一個故事——是一位愛你的神，親自為你付上了代價，只為把你贖回。",
        verse:"「惟有基督在我們還作罪人的時候為我們死，神的愛就在此向我們顯明了。」（羅五8）",
        pray:"主耶穌，謝謝你為我死、為我復活，你的愛我實在不配得。" },
      { d:4, t:"你看見自己了嗎",
        msg:"在這位神的愛裡，我們可以誠實一點：我們都曾想自己作主、以自己為中心，這就是聖經說的『罪』。但看見這一點不是要你自責——而是因為，唯有承認，才能被醫治。你不是一個人在掙扎。",
        verse:"「世人都犯了罪，虧缺了神的榮耀。」（羅三23）",
        pray:"神啊，我承認我需要你。我不想再自己作主，我願意讓你帶領。" },
      { d:5, t:"一個好消息：無己",
        msg:"福音的核心是：不再是我，乃是基督。當我們把生命交給耶穌，舊的有己的生命，就換成新的、有基督的生命。這不是失去自己，而是進入一個更豐盛、更自由的生命。",
        verse:"「現在活著的不再是我，乃是基督在我裡面活著。」（加二20）",
        pray:"主耶穌，我願意讓你在我裡面活，作我生命的主。" },
      { d:6, t:"你不是一個人",
        msg:"跟隨耶穌，不是孤單的旅程。神為你預備了一個屬靈的家——有屬靈的同伴、有像父母般陪伴你的人、有一起同行的弟兄姊妹。你會被愛、被牧養、被同行。",
        verse:"「看哪，弟兄和睦同居是何等地善，何等地美！」（詩一三三1）",
        pray:"神啊，謝謝你為我預備了一個家，我不再需要孤單面對人生。" },
      { d:7, t:"你願意嗎",
        msg:"走到這裡，也許你的心正被觸動。這不是宗教的要求，而是一位愛你的神，向你發出的邀請：你願意接受祂的愛，讓耶穌成為你生命的主嗎？如果你願意，就用下面的禱告，向祂說。",
        verse:"「看哪，我站在門外叩門，若有聽見我聲音就開門的，我要進到他那裡去。」（啟三20）",
        pray:"（請往下做決志禱告）" }

    believerPath: [

      { d:2, t:"三個基礎：321的根基",

function icon(name,sz){ sz=sz||24; return '<svg viewBox="0 0 24 24" width="'+sz+'" height="'+sz+'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(IC[name]||"")+'</svg>'; }

/* ---- 小元件 ---- */
function sect(n,title){ return '<div class="section-label"><span class="n">'+n+'</span><h2>'+esc(title)+'</h2></div>'; }
function slot(text){ return '<div class="slot">'+text+'</div>'; }
function pageHead(eyebrow,title,sub){
  return '<div class="eyebrow">'+esc(eyebrow)+'</div>'+
         '<h1 class="page-title">'+esc(title)+'</h1>'+
         (sub?'<p class="page-sub">'+esc(sub)+'</p>':'');
}
function rowlink(ic,title,sub,route){
  return '<button class="rowlink" data-route="'+route+'">'+
    '<span class="ri">'+icon(ic,22)+'</span>'+
    '<span class="rt"><b>'+esc(title)+'</b><span>'+esc(sub)+'</span></span>'+
    '<span class="chev">'+icon("chev",20)+'</span></button>';
}
function appcards(){
  var list=D.ecosystem||[], out='<div class="apps">';
  for(var i=0;i<list.length;i++){ var a=list[i];
    var head = a.img ? '<span class="appicon"><img src="'+a.img+'" alt=""></span>'
                     : '<span class="badge">'+esc(a.badge)+'</span>';
    out+='<a class="appcard" href="'+esc(a.url)+'" target="_blank" rel="noopener">'+
      head+'<b>'+esc(a.name)+'</b><span>'+esc(a.desc)+'</span></a>';
  }
  return out+'</div>';
}

/* ---- 資源中心 ---- */
var FMT=[
  { k:"article",  label:"文章", ic:"book" },
  { k:"manuscript_doc", label:"講章", ic:"book" },
  { k:"slides_pdf", label:"投影片", ic:"video" },
  { k:"video",    label:"視頻", ic:"video" },
  { k:"questions",label:"討論", ic:"users" }
];
function fmtButtons(f){
  f=f||{}; var out='';
  for(var j=0;j<FMT.length;j++){ var def=FMT[j]; var url=f[def.k];
    if(url) out+='<a class="fmt" href="'+esc(url)+'" target="_blank" rel="noopener">'+icon(def.ic,16)+' '+def.label+'</a>';
  }
  return out;
}
function resById(id){
  var list=D.resources||[];
  for(var i=0;i<list.length;i++){ if(list[i].id===id) return list[i]; }
  return null;
}
function resMatch(r){
  if(RES_STAGE && RES_STAGE!=="全部" && (r.stage||"")!==RES_STAGE) return false;
  var q=(RES_Q||"").replace(/^\s+|\s+$/g,"");
  if(!q) return true;
  var hay=((r.title||"")+" "+(r.series||"")+" "+(r.scripture||"")+" "+((r.topics||[]).join(" "))).toLowerCase();
  return hay.indexOf(q.toLowerCase())>-1;
}
function renderResList(){
  var list=D.resources||[];
  var rows='', shown=0;
  for(var i=0;i<list.length;i++){ var r=list[i];
    if(!resMatch(r)) continue;
    shown++;
    var fmts=fmtButtons(r.formats);
    rows+='<div class="rescard">'+
      (r.forServers?'<span class="pack">適合帶領</span>':'')+
      '<b>'+esc(r.title)+'</b>'+
      '<div class="resmeta">'+(r.series?esc(r.series)+' · ':'')+(r.scripture?esc(r.scripture):'')+'</div>'+
      (r.stage?'<span class="restag">'+esc(r.stage)+'</span>':'')+
      (fmts?'<div class="fmts">'+fmts+'</div>':'')+
    '</div>';
  }
  if(!list.length) return slot('資源卡即將加入。<br>每篇信息一張卡，掛著 <b>文章 · 講章 · 投影片 · 視頻 · 討論</b> 多種型態。（同工可在 data.json 的 resources 新增）');
  if(!shown) return slot('找不到符合的資源，換個關鍵字或分類試試。');
  return rows;
}

var RES_STAGE=null;
var RES_Q="";
var PAGES = {

  home: function(){

/* ---- 底部導覽 ---- */
var TABS=[
  {r:"home",label:"首頁",ic:"home"},
  {r:"resources",label:"資源",ic:"book"},
  {r:"meet",label:"聚會",ic:"zoom"},
  {r:"newfriend",label:"新朋友",ic:"heart"},
  {r:"more",label:"更多",ic:"more"}
];
function renderTabs(active){
  var out="";
  for(var i=0;i<TABS.length;i++){ var t=TABS[i];
    out+='<button class="tab'+(t.r===active?' on':'')+'" data-route="'+t.r+'">'+icon(t.ic,24)+'<span>'+t.label+'</span></button>';
  }
  $("tabbar").innerHTML=out;
}

/* ---- 路由 ---- */
var TAB_ROUTES={home:1,resources:1,meet:1,newfriend:1,more:1};
function go(route){ if(location.hash!=="#/"+route) location.hash="#/"+route; else render(route); }
function currentRoute(){ var h=location.hash.replace(/^#\//,""); return PAGES[h]?h:"home"; }
function render(route){
  route=route||currentRoute();
  var fn=PAGES[route]||PAGES.home;
  $("view").innerHTML=fn();
  // 對應 tab 高亮：非 tab 頁時，高亮「更多」
  renderTabs(TAB_ROUTES[route]?route:"more");
  // 返回鍵：非首頁且非 tab 頁時顯示
  $("backBtn").style.display = (route!=="home") ? "inline-flex" : "none";
  window.scrollTo(0,0);
  bindDynamic();
}

/* ---- 動態綁定（每次渲染後） ---- */
function bindDynamic(){
  var rs=$("resSearch");
  if(rs){ rs.oninput=function(){ RES_Q=rs.value||""; var lst=$("resList"); if(lst) lst.innerHTML=renderResList(); }; }
  var share=$("shareBtn");
  if(share) share.onclick=function(){
    var url=location.origin+location.pathname;
    if(navigator.share){ navigator.share({title:"國度321空中團契",text:"歡迎回家，一起認識321！",url:url}).catch(function(){}); }
    else { note("邀請連結：\n"+url+"\n（可複製分享；完整邀請卡將於內容階段加入）"); }
  };
  var os=$("openSet"); if(os) os.onclick=openSet;
  // data-note 佔位提示
  var btns=document.querySelectorAll("[data-note]");
  for(var i=0;i<btns.length;i++){ (function(b){ b.onclick=function(){ note(b.getAttribute("data-note")); }; })(btns[i]); }
}

/* ---- 委派點擊（路由） ---- */
document.addEventListener("click",function(e){
  var el=e.target;
  while(el && el!==document){
    if(el.getAttribute && el.getAttribute("data-resstage")){ RES_STAGE=el.getAttribute("data-resstage"); render("resources"); window.scrollTo(0,0); return; }
    if(el.getAttribute && el.getAttribute("data-contact")){ openContact(el.getAttribute("data-contact")); return; }
    if(el.getAttribute && el.getAttribute("data-nftrack")){ var tk=el.getAttribute("data-nftrack"); NF_TRACK=(tk==="_reset")?null:tk; render("newfriend"); window.scrollTo(0,0); return; }
    if(el.getAttribute && el.getAttribute("data-route")){ go(el.getAttribute("data-route")); return; }
    if(el.getAttribute && el.getAttribute("data-close")){ closeSheets(); return; }
    el=el.parentNode;
  }
});

/* ---- 面板 ---- */
function openSheet(id){ $(id).classList.add("open"); }
function closeSheets(){ var s=document.querySelectorAll(".sheet"); for(var i=0;i<s.length;i++) s[i].classList.remove("open"); }
function openSet(){ openSheet("setSheet"); }
function note(msg){ // 簡易提示（暫用 alert；內容階段可換自訂浮層）
  try{ window.alert(msg); }catch(e){}
}

/* ---- 接待表單 ---- */
var CT_TYPE="";
var CT_META={
  "決志":   { title:"歡迎你回家！", intro:"恭喜你把生命交給了耶穌！留下聯絡方式，接待同工會盡快來歡迎你、陪你走信仰的第一步。", done:"接待同工會盡快與你聯繫，陪你開始新生命。天上正為你歡喜！" },
  "慕道":   { title:"我想找人聊聊", intro:"想找一位真人陪你聊聊、為你禱告嗎？留下聯絡方式即可，我們很樂意。", done:"接待同工會在 24 小時內與你聯繫。你不孤單！" },
  "認識321":{ title:"我想認識321", intro:"留下聯絡方式，我們會請同工陪你一起認識321、加入空中團契。", done:"同工會盡快與你聯繫，陪你一起認識321。" }
};
function openContact(type){
  CT_TYPE=type;
  var meta=CT_META[type]||{title:"留下聯絡方式",intro:"接待同工會盡快與你聯繫。",done:"我們收到了！"};
  $("ctTitle").innerHTML=meta.title; $("ctIntro").innerHTML=meta.intro;
  $("ctForm").style.display=""; $("ctDone").style.display="none";
  $("ctName").value=""; $("ctContact").value=""; $("ctMsg").value="";
  openSheet("contactSheet");
}
function saveLocalContact(rec){
  try{ var k="k321_contacts"; var arr=JSON.parse(lsGet(k)||"[]"); arr.push(rec); lsSet(k,JSON.stringify(arr)); }catch(e){}
}
function submitContact(){
  var name=($("ctName").value||"").replace(/^\s+|\s+$/g,"");
  var contact=($("ctContact").value||"").replace(/^\s+|\s+$/g,"");
  if(!name || !contact){ note("請留下你的稱呼與聯絡方式，我們才能找到你 🙂"); return; }
  var rec={ type:CT_TYPE, name:name, contact:contact,
    message:($("ctMsg").value||""), time:(new Date()).toISOString(),
    ua:(navigator.userAgent||"") };
  saveLocalContact(rec);
  var meta=CT_META[CT_TYPE]||{done:"我們收到了！"};
  function showDone(){ $("ctForm").style.display="none"; $("ctDone").style.display=""; $("ctDoneMsg").innerHTML=meta.done; }
  var ep=(window.APP_CONFIG&&window.APP_CONFIG.contactEndpoint)||"";
  var btn=$("ctSend"); if(btn){ btn.disabled=true; btn.innerHTML="送出中…"; }
  if(ep){
    try{
      fetch(ep,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(rec) })
        .then(function(){ showDone(); })
        .catch(function(){ showDone(); }) // 失敗也顯示完成(已本機備援)，避免嚇到新朋友
        .then(function(){ if(btn){btn.disabled=false;btn.innerHTML="送出，讓同工來認識我";} });
    }catch(e){ showDone(); if(btn){btn.disabled=false;btn.innerHTML="送出，讓同工來認識我";} }
  }else{
    // 尚未設定後端：本機已記錄，直接顯示完成
    showDone(); if(btn){btn.disabled=false;btn.innerHTML="送出，讓同工來認識我";}
  }
}

/* ---- 字級 ---- */
function applyFs(v){ document.documentElement.style.setProperty("--fs",v); markFs(v); }
function markFs(v){
  var opts=$("fsOpts").querySelectorAll("button");
  for(var i=0;i<opts.length;i++){ opts[i].className = (opts[i].getAttribute("data-fs")===String(v))?"on":""; }
}
function initFs(){
  var v=lsGet("k321_fontscale")||"1";
  applyFs(v);
  var opts=$("fsOpts").querySelectorAll("button");
  for(var i=0;i<opts.length;i++){ (function(b){
    b.onclick=function(){ var val=b.getAttribute("data-fs"); applyFs(val); lsSet("k321_fontscale",val); };
  })(opts[i]); }
}

/* ---- 求助分流 ---- */
function initHelp(){
  $("helpBtn").onclick=function(){ openSheet("helpSheet"); };
  var hb=document.querySelectorAll("[data-help]");
  for(var i=0;i<hb.length;i++){ (function(b){
    b.onclick=function(){
      var t=b.getAttribute("data-help");
      var msg = t==="urgent" ? "若有立即危險，請撥打當地緊急電話。\n（各國緊急與求助專線將於內容階段依所在地補齊，並直通接待同工。）"
              : t==="care"   ? "你不孤單。我們會為你連上一位關懷同工陪你。\n（接待流程將於內容階段加入。）"
              : "我們會把你的名字放上代禱，天天為你禱告。\n（代禱入口將於內容階段加入。）";
      note(msg);
    };
  })(hb[i]); }
}

/* ---- 啟動 ---- */
function init(){
  $("backBtn").onclick=function(){ if(history.length>1) history.back(); else go("home"); };
  $("setBtn").onclick=openSet;
  initFs();
  var _cs=$("ctSend"); if(_cs) _cs.onclick=submitContact;
  initHelp();
  window.addEventListener("hashchange",function(){ render(); });
  // 先嘗試讀外部 data.json（同工可自行更新內容），讀不到則用內嵌備援
  loadContent(function(){ render(); });
  // Service Worker（部署後啟用；沙箱可能失敗，故 try/catch）
  if("serviceWorker" in navigator){
    try{ navigator.serviceWorker.register("sw.js"); }catch(e){}
  }
}

/* 讀取外部內容並合併覆蓋內嵌預設；任何失敗都安全退回內嵌資料 */
function loadContent(done){
  var finished=false;
  function finish(){ if(finished) return; finished=true; try{ done(); }catch(e){} }
  try{
    if(!window.fetch){ finish(); return; }
    var url="data.json?v="+(new Date()).getTime();   // 加時間戳避免快取舊內容
    fetch(url).then(function(r){ return r.ok ? r.json() : null; })
      .then(function(j){
        if(j && typeof j==="object"){
          for(var k in j){ if(Object.prototype.hasOwnProperty.call(j,k)) window.APP_DATA[k]=j[k]; }
          D=window.APP_DATA;
        }
        finish();
      })
      .catch(function(){ finish(); });
    // 保險：1.8 秒內若無回應就先用內嵌資料渲染，不讓畫面卡住
    setTimeout(finish, 1800);
  }catch(e){ finish(); }
}
if(document.readyState!=="loading") init();
else document.addEventListener("DOMContentLoaded",init);

})();

</script>
